version: 0.2
env:
  variables:
    FRONTEND_BUCKET: "expression-frontend-prod-696715200075"
    CLOUDFRONT_DIST_ID: "E3CAAG6S4I86K5"
phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands: npm ci
  build:
    commands:
      - npm run build
      - aws s3 sync dist/ s3://$FRONTEND_BUCKET --delete
      - aws cloudfront create-invalidation
          --distribution-id $CLOUDFRONT_DIST_ID --paths "/*"
